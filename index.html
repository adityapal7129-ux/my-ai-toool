<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HULK AI DASHBOARD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(12px); border-right: 1px solid rgba(255,255,255,0.1); padding: 25px; display: flex; flex-direction: column; }
        .sidebar h2 { color: #38bdf8; margin-bottom: 35px; font-size: 26px; font-weight: 800; text-align: center; letter-spacing: 1px; }
        .nav-btn { background: none; border: none; color: #94a3b8; padding: 15px; text-align: left; width: 100%; cursor: pointer; border-radius: 10px; margin-bottom: 12px; transition: 0.3s; font-size: 15px; font-weight: 500; }
        .nav-btn:hover { background: rgba(56, 189, 248, 0.2); color: white; }
        .nav-btn.active { background: #38bdf8; color: white; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.4); }
        .main-content { flex: 1; display: flex; flex-direction: column; background: #020617; }
        .header { padding: 20px 30px; background: #0f172a; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tool-container { flex: 1; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>HULK AI</h2>
        <button class="nav-btn active" onclick="loadTool('https://huggingface.co/spaces/InstantX/InstantID', this)">🔥 Instant Face Swap</button>
        <button class="nav-btn" onclick="loadTool('https://huggingface.co/spaces/stabilityai/stable-diffusion-3-medium', this)">🎨 Image Generator</button>
        <button class="nav-btn" onclick="loadTool('https://huggingface.co/spaces/huggingface-projects/gemma-2-9b-it', this)">💬 AI Chat (Smart)</button>
        <div style="margin-top: auto; font-size: 11px; color: #475569; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;">HULK MERA BHAI SPECIAL</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 id="tool-title">Instant Face Swap (Pro)</h2>
        </div>
        <div class="tool-container">
            <iframe id="tool-frame" src="https://huggingface.co/spaces/InstantX/InstantID"></iframe>
        </div>
    </div>

    <script>
        function loadTool(url, btn) {
            document.getElementById('tool-frame').src = url;
            document.getElementById('tool-title').innerText = btn.innerText;
            let btns = document.querySelectorAll('.nav-btn');
            btns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
