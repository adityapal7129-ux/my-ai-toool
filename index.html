<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HULK AI DASHBOARD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 250px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-right: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { color: #38bdf8; margin-bottom: 30px; font-size: 24px; text-align: center; }
        .nav-btn { background: none; border: none; color: #94a3b8; padding: 15px; text-align: left; width: 100%; cursor: pointer; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; font-size: 16px; }
        .nav-btn:hover, .nav-btn.active { background: #38bdf8; color: white; }

        /* Main Content */
        .main-content { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .header { margin-bottom: 20px; }
        .tool-container { flex: 1; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>HULK AI</h2>
        <button class="nav-btn active">Face Swap (Cloud)</button>
        <button class="nav-btn">Image Generator</button>
        <button class="nav-btn">Voice AI</button>
        <div style="margin-top: auto; font-size: 12px; color: #64748b; text-align: center;">Powered by Cloud GPU</div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>AI Face Swap Tool</h1>
            <p style="color: #94a3b8;">Hugging Face Cloud Server se connected</p>
        </div>
        
        <div class="tool-container">
            <iframe src="https://huggingface.co/spaces/felixrosberg/face-swap" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

</body>
</html>
